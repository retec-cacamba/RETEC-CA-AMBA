<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RETEC Caçambas</title>
<style>
body{font-family:Arial;max-width:600px;margin:0 auto;padding:20px;background:#f5f5f5}
.caixa{background:white;padding:20px;border-radius:10px;margin-bottom:15px;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
h2{text-align:center;margin-bottom:15px}
button{background:#25d366;color:white;border:none;padding:12px 20px;border-radius:5px;cursor:pointer;width:100%;font-size:16px;font-weight:700}
input,select{width:100%;padding:10px;margin:5px 0;border:1px solid #ddd;border-radius:5px;box-sizing:border-box;font-size:15px}
#qrcode{margin-top:20px;text-align:center}
.hidden{display:none}
.preco{font-size:24px;color:#25d366;font-weight:bold;text-align:center}
.riscado{text-decoration:line-through;color:#999;font-size:16px;text-align:center;display:block}
</style>
</head>
<body>

<div class="caixa" id="etapa1">
<h2>RETEC Caçambas</h2>
<p style="text-align:center;color:#666">Aluguel com 7 dias e Frete Grátis</p>

<label>Escolha a Caçamba:</label>
<select id="produto" onchange="atualizarPreco()">
  <option value="200">Caçamba 3m³ - R$200,00</option>
  <option value="269.99">Caçamba 4m³ - R$269,99</option>
  <option value="319.99">Caçamba 5m³ - R$319,99</option>
  <option value="409.99">Caçamba 7m³ - R$409,99</option>
</select>

<p>Total: <span class="riscado" id="precoOriginal">R$200.00</span> <span class="preco" id="precoFinal">R$200.00</span></p>
<p style="text-align:center;font-size:12px;color:#2e7d32">Cupom RETEC50 aplicado automaticamente: -R$100</p>

<button onclick="irParaEtapa2()">Continuar</button>
</div>

<div class="caixa hidden" id="etapa2">
<h2>Seus Dados</h2>
<input type="text" id="nome" placeholder="Nome Completo">
<input type="text" id="cpf" placeholder="CPF">
<button onclick="gerarPix()">Gerar PIX</button>
</div>

<div class="caixa hidden" id="etapa3">
<h2>Pague com PIX</h2>
<div id="qrcode"></div>
<input type="text" id="copia" readonly>
<button onclick="copiar()">Copiar Código PIX</button>
</div>

<script>
let precoAtual = 200;

function atualizarPreco(){
  precoAtual = parseFloat(document.getElementById('produto').value);
  let precoComDesconto = precoAtual - 100;
  if(precoComDesconto < 0) precoComDesconto = 0;
  
  document.getElementById('precoOriginal').innerText = 'R$' + precoAtual.toFixed(2);
  document.getElementById('precoFinal').innerText = 'R$' + precoComDesconto.toFixed(2);
}

function irParaEtapa2(){
  document.getElementById('etapa1').classList.add('hidden');
  document.getElementById('etapa2').classList.remove('hidden');
}

async function gerarPix(){
  let nome = document.getElementById('nome').value;
  let cpf = document.getElementById('cpf').value;
  let valor = precoAtual - 100;
  if(valor < 0) valor = 0;
  
  if(!nome || !cpf){ alert('Preencha nome e CPF'); return; }

  const res = await fetch('/gerar-pix', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      valor: valor,
      descricao: 'Aluguel Caçamba RETEC',
      nome: nome,
      cpf: cpf
    })
  });
  
  const data = await res.json();
  document.getElementById('etapa2').classList.add('hidden');
  document.getElementById('etapa3').classList.remove('hidden');
  document.getElementById('qrcode').innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${data.copiaecola}">`;
  document.getElementById('copia').value = data.copiaecola;
}

function copiar(){
  navigator.clipboard.writeText(document.getElementById('copia').value);
  alert('Código PIX copiado!');
}

atualizarPreco(); // carrega já com desconto
</script>
</body>
  </html>
