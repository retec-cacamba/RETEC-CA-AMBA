<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RETEC Caçambas</title>
<style>
body{font-family:Arial;max-width:600px;margin:0 auto;padding:20px;background:#f5f5f5}
.caixa{background:white;padding:20px;border-radius:10px;margin-bottom:15px;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
button{background:#25d366;color:white;border:none;padding:12px 20px;border-radius:5px;cursor:pointer;width:100%;font-size:16px}
input{width:100%;padding:10px;margin:5px 0;border:1px solid #ddd;border-radius:5px;box-sizing:border-box}
#qrcode{margin-top:20px;text-align:center}
.hidden{display:none}
.preco{font-size:24px;color:#25d366;font-weight:bold}
.riscado{text-decoration:line-through;color:#999;font-size:16px}
</style>
</head>
<body>

<div class="caixa">
<h2>RETEC Caçambas</h2>
<label>Escolha a Caçamba:</label>
<select id="produto" onchange="atualizarPreco()">
  <option value="200">Caçamba 3m³ - R$200</option>
  <option value="250">Caçamba 5m³ - R$250</option>
</select>

<label style="margin-top:10px">Cupom de Desconto:</label>
<input type="text" id="cupom" placeholder="Digite RETEC50" onkeyup="aplicarCupom()">
<p id="msgCupom"></p>

<p>Total: <span class="riscado" id="precoOriginal">R$200</span> <span class="preco" id="precoFinal">R$200</span></p>
<button onclick="irParaEtapa2()">Continuar</button>
</div>

<div class="caixa hidden" id="etapa2">
<h2>Seus Dados</h2>
<input type="text" id="nome" placeholder="Nome Completo">
<input type="text" id="cpf" placeholder="CPF">
<button onclick="gerarPix()">Gerar PIX</button>
</div>

<div class="caixa hidden" id="etapa3">
<h2>Pague com PIX</h2>
<div id="qrcode"></div>
<input type="text" id="copia" readonly>
<button onclick="copiar()">Copiar Código PIX</button>
</div>

<script>
let precoAtual = 200;
let temDesconto = false;

function atualizarPreco(){
  precoAtual = parseFloat(document.getElementById('produto').value);
  document.getElementById('precoOriginal').innerText = 'R$' + precoAtual;
  aplicarCupom();
}

function aplicarCupom(){
  let cupom = document.getElementById('cupom').value.toUpperCase();
  if(cupom === 'RETEC50'){
    temDesconto = true;
    let novoPreco = precoAtual - 100;
    document.getElementById('precoFinal').innerText = 'R$' + novoPreco;
    document.getElementById('msgCupom').innerText = 'Cupom aplicado: -R$100';
    document.getElementById('msgCupom').style.color = 'green';
  } else {
    temDesconto = false;
    document.getElementById('precoFinal').innerText = 'R$' + precoAtual;
    document.getElementById('msgCupom').innerText = '';
  }
}

function irParaEtapa2(){
  document.getElementById('etapa2').classList.remove('hidden');
}

async function gerarPix(){
  let nome = document.getElementById('nome').value;
  let cpf = document.getElementById('cpf').value;
  let valor = temDesconto ? precoAtual - 100 : precoAtual;
  
  if(!nome || !cpf){ alert('Preencha nome e CPF'); return; }

  const res = await fetch('/gerar-pix', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      valor: valor,
      descricao: 'Aluguel Caçamba RETEC',
      nome: nome,
      cpf: cpf
    })
  });
  
  const data = await res.json();
  document.getElementById('etapa3').classList.remove('hidden');
  document.getElementById('qrcode').innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${data.copiaecola}">`;
  document.getElementById('copia').value = data.copiaecola;
}

function copiar(){
  navigator.clipboard.writeText(document.getElementById('copia').value);
  alert('Código PIX copiado!');
}
</script>
</body>
</html>
